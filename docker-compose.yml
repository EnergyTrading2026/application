version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    environment:
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy123
      POSTGRES_DB: energy_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy -d energy_trading"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: energy-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/energy_trading
      SPRING_DATASOURCE_USERNAME: energy
      SPRING_DATASOURCE_PASSWORD: energy123
      SPRING_DATASOURCE_DRIVER-CLASS-NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL-AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
