<!-- TopBar -->
<div class="page-header">
  <span class="topBar">Simulation / Setting Parameters</span>
</div>


<svg width="1000" height="900" xmlns="http://www.w3.org/2000/svg">
  
  <!-- PowerGrid -->
    <circle [attr.cx]="PowerGridCircle.cx" [attr.cy]="PowerGridCircle.cy" [attr.r]="PowerGridCircle.r"
          fill= #ededed stroke="white" stroke-width="1.5"/>
     <text [attr.x]="PowerGridCircle.cx" 
        [attr.y]="PowerGridCircle.cy + 5"
        fill= #613B3C text-anchor="middle" font-size="17">Power Grid</text>

    <!-- GasGrid -->
    <circle [attr.cx]="GasGridCircle.cx" [attr.cy]="GasGridCircle.cy" [attr.r]="GasGridCircle.r"
          fill= #6e757d stroke= #6e757d stroke-width="1.5"/>
     <text [attr.x]="GasGridCircle.cx" 
        [attr.y]="GasGridCircle.cy + 5"
        fill= #30353A text-anchor="middle" font-size="17">Gas Grid</text>

  

  <!-- Arrow: PowerGridCircle TOP to Large-Scale Heat Pump LEFT -->
  <polyline 
    [attr.points]="PowerGridCircleTop.x+','+PowerGridCircleTop.y+' '+PowerGridCircleTop.x+','+HeatPumpBoxLeft.y+' '+HeatPumpBoxLeft.x+','+HeatPumpBoxLeft.y"
    fill="none" stroke="white" stroke-width="1.5" marker-end="url(#whiteArrow)"/>

    <!-- Arrow: GasGridCircle TOP to CHP LEFT -->
  <polyline 
    [attr.points]="GasGridCircleTop.x+','+GasGridCircleTop.y+' '+GasGridCircleTop.x+','+CHPBoxLeft.y+' '+CHPBoxLeft.x+','+CHPBoxLeft.y"
    fill="none" stroke= #6e757d stroke-width="1.5" marker-end="url(#greyArrow)"/>

    <!-- Arrow: GasGridCircle TOP to Boiler LEFT -->
  <polyline 
    [attr.points]="GasGridCircleTop.x+','+GasGridCircleTop.y+' '+GasGridCircleTop.x+','+BoilerBoxLeft.y+' '+BoilerBoxLeft.x+','+BoilerBoxLeft.y"
    fill="none" stroke= #6e757d stroke-width="1.5" marker-end="url(#greyArrow)"/>



    <!-- Large-Scale Heat Pump -->
  <rect [attr.x]="HeatPumpBox.x" [attr.y]="HeatPumpBox.y" 
        [attr.width]="HeatPumpBox.width" [attr.height]="HeatPumpBox.height"
        rx="15" ry="15"
        fill="url(#whiteToRedGradient)" stroke="none"/>
  <text [attr.x]="HeatPumpBox.x + HeatPumpBox.width / 2" 
        [attr.y]="HeatPumpBox.y + HeatPumpBox.height / 2"
        fill= #613B3C text-anchor="middle" font-size="17">Large-Scale</text>
  <text [attr.x]="HeatPumpBox.x + HeatPumpBox.width / 2" 
        [attr.y]="HeatPumpBox.y + HeatPumpBox.height / 2 + 20"
        fill= #613B3C text-anchor="middle" font-size="17">Heat Pump</text>

    <!-- CHP -->
  <rect [attr.x]="CHPBox1.x" [attr.y]="CHPBox1.y" 
        [attr.width]="CHPBox1.width" [attr.height]="CHPBox1.height"
        fill="url(#greyWhiteGradient)" stroke="none"/>
    <rect [attr.x]="CHPBox2.x" [attr.y]="CHPBox2.y" 
        [attr.width]="CHPBox2.width" [attr.height]="CHPBox2.height"
        fill="url(#greyRedGradient)" stroke="none"/>
    <text [attr.x]="CHPBox1.x + CHPBox1.width / 2" 
        [attr.y]="CHPBox1.y + CHPBox1.height + 5"
        fill= #443A3E text-anchor="middle" font-size="17">CHP</text>

    <!-- Condensing Boiler -->
  <rect [attr.x]="BoilerBox.x" [attr.y]="BoilerBox.y" 
        [attr.width]="BoilerBox.width" [attr.height]="BoilerBox.height"
        rx="15" ry="15"
        fill="url(#greyRedGradient)" stroke="none"/>
  <text [attr.x]="BoilerBox.x + BoilerBox.width / 2" 
        [attr.y]="BoilerBox.y + BoilerBox.height / 2"
        fill= #542D2E text-anchor="middle" font-size="17">Condensing</text>
  <text [attr.x]="BoilerBox.x + BoilerBox.width / 2" 
        [attr.y]="BoilerBox.y + BoilerBox.height / 2 + 20"
        fill= #542D2E text-anchor="middle" font-size="17">Boiler</text>

     <!-- Arrow: Large-Scale Heat Pump RIGHT to Or TOP -->
  <polyline 
    [attr.points]="HeatPumpBoxRight.x+','+HeatPumpBoxRight.y+' '+OrCircleTop.x+','+HeatPumpBoxRight.y+' '+OrCircleTop.x+','+OrCircleTop.y"
    fill="none" stroke= #e25b5b stroke-width="1.5" marker-end="url(#redArrow)"/>

    <!-- Arrow: CHP RIGHT to Or TOP -->
  <line 
    [attr.x1]="CHPBoxRight.x" [attr.y1]="CHPBoxRight.y" [attr.x2]="OrCircleLeft.x" [attr.y2]="OrCircleLeft.y"
    fill="none" stroke="#e25b5b" stroke-width="1.5" marker-end="url(#redArrow)"/>

    <!-- Arrow: Boiler RIGHT to Or TOP -->
  <polyline 
    [attr.points]="BoilerBoxRight.x+','+BoilerBoxRight.y+' '+OrCircleBottom.x+','+BoilerBoxRight.y+' '+OrCircleBottom.x+','+OrCircleBottom.y"
    fill="none" stroke= #e25b5b stroke-width="1.5" marker-end="url(#redArrow)"/>
        

    <!-- Or -->
    <circle [attr.cx]="OrCircle.cx" [attr.cy]="OrCircle.cy" [attr.r]="OrCircle.r"
          fill= "White" stroke="white" stroke-width="1.5"/>
     <text [attr.x]="OrCircle.cx" 
        [attr.y]="OrCircle.cy + 5"
        fill= #000000 text-anchor="middle" font-size="17">OR</text>

    <!-- Arrow: Or TOPRIGHT to Thermal Storage LEFT -->
  <line 
    [attr.x1]="OrCircleTopRight.x" [attr.y1]="OrCircleTopRight.y" [attr.x2]="ThermalStorageBoxLeft.x" [attr.y2]="ThermalStorageBoxLeft.y"
    fill="none" stroke="#e25b5b" stroke-width="1.5" marker-end="url(#redArrow)"/>

    <!-- Arrow: Or BOTTOMRIGHT to District Heating Network TOPLEFT -->
  <line 
    [attr.x1]="OrCircleBottomRight.x" [attr.y1]="OrCircleBottomRight.y" [attr.x2]="HeatingNetworkCircleTopLeft.x" [attr.y2]="HeatingNetworkCircleTopLeft.y"
    fill="none" stroke="#e25b5b" stroke-width="1.5" marker-end="url(#redArrow)"/>



    <!-- Thermal Storage -->
  <rect [attr.x]="ThermalStorageBox.x" [attr.y]="ThermalStorageBox.y" 
        [attr.width]="ThermalStorageBox.width" [attr.height]="ThermalStorageBox.height"
        rx="15" ry="15"
        fill= #e25b5b stroke="none"/>
  <text [attr.x]="ThermalStorageBox.x + ThermalStorageBox.width / 2" 
        [attr.y]="ThermalStorageBox.y + ThermalStorageBox.height / 2"
        fill= #6D2626 text-anchor="middle" font-size="17">Thermal</text>
  <text [attr.x]="ThermalStorageBox.x + ThermalStorageBox.width / 2" 
        [attr.y]="ThermalStorageBox.y + ThermalStorageBox.height / 2 + 20"
        fill= #6D2626 text-anchor="middle" font-size="17">Storage</text>

    <!-- District Heating Network -->
    <circle [attr.cx]="HeatingNetworkCircle.cx" [attr.cy]="HeatingNetworkCircle.cy" [attr.r]="HeatingNetworkCircle.r"
          fill= #e25b5b stroke= #e25b5b stroke-width="1.5"/>
     <text [attr.x]="HeatingNetworkCircle.cx" 
        [attr.y]="HeatingNetworkCircle.cy - 10"
        fill= #6D2626 text-anchor="middle" font-size="17">District</text>
    <text [attr.x]="HeatingNetworkCircle.cx" 
        [attr.y]="HeatingNetworkCircle.cy + 5"
        fill= #6D2626 text-anchor="middle" font-size="17">Heating</text>
    <text [attr.x]="HeatingNetworkCircle.cx" 
        [attr.y]="HeatingNetworkCircle.cy + 20"
        fill= #6D2626 text-anchor="middle" font-size="17">Network</text>

    <!-- Arrow: Thermal Storage BOTTOM to District Heating Network TOP -->
  <line 
    [attr.x1]="ThermalStorageBoxBottom.x" [attr.y1]="ThermalStorageBoxBottom.y" [attr.x2]="HeatingNetworkCircleTop.x" [attr.y2]="HeatingNetworkCircleTop.y"
    fill="none" stroke="#e25b5b" stroke-width="1.5" marker-end="url(#redArrow)"/>


    <!-- Thermal Legend -->
  <rect [attr.x]="ThermalLegendBox.x" [attr.y]="ThermalLegendBox.y" 
        [attr.width]="ThermalLegendBox.width" [attr.height]="ThermalLegendBox.height"
        rx="15" ry="15"
        fill=" #e25b5b" stroke="none"/>
  <text [attr.x]="ThermalLegendBox.x + ThermalLegendBox.width / 2" 
        [attr.y]="ThermalLegendBox.y + ThermalLegendBox.height / 2 + 5"
        fill= #6F2627 text-anchor="middle" font-size="17">Thermal</text>

    <!-- Electricity Legend -->
  <rect [attr.x]="ElectricityLegendBox.x" [attr.y]="ElectricityLegendBox.y" 
        [attr.width]="ElectricityLegendBox.width" [attr.height]="ElectricityLegendBox.height"
        rx="15" ry="15"
        fill=" #ECEDED" stroke="none"/>
  <text [attr.x]="ElectricityLegendBox.x + ElectricityLegendBox.width / 2" 
        [attr.y]="ElectricityLegendBox.y + ElectricityLegendBox.height / 2 + 5"
        fill= #545455 text-anchor="middle" font-size="17">Electricity</text>

    <!-- Gas Legend -->
  <rect [attr.x]="GasLegendBox.x" [attr.y]="GasLegendBox.y" 
        [attr.width]="GasLegendBox.width" [attr.height]="GasLegendBox.height"
        rx="15" ry="15"
        fill=" #898C92" stroke="none"/>
  <text [attr.x]="GasLegendBox.x + GasLegendBox.width / 2" 
        [attr.y]="GasLegendBox.y + GasLegendBox.height / 2 + 5"
        fill= #2D3137 text-anchor="middle" font-size="17">Gas</text>
   


    <defs>
        <!-- WhiteArrowhead definition -->
        <marker id="whiteArrow" markerWidth="8" markerHeight="10" 
            refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill="white"/>
        </marker>

        <!-- GreyArrowhead definition -->
        <marker id="greyArrow" markerWidth="8" markerHeight="10" 
            refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill= #6e757d/>
        </marker>

         <!-- RedArrowhead definition -->
        <marker id="redArrow" markerWidth="8" markerHeight="10" 
            refX="8" refY="3" orient="auto">
        <path d="M0,0 L0,6 L9,3 z" fill= #e25b5b/>
        </marker>

        <!-- White to red gradient -->
        <linearGradient id="whiteToRedGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#eceded"/>
            <stop offset="50%" stop-color="#e6a6a6"/>
            <stop offset="100%" stop-color="#e25b5b"/>
        </linearGradient>

        <!-- Grey to white gradient -->
        <linearGradient id="greyWhiteGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#6e757d"/>  
            <stop offset="50%"  stop-color="#a9adb0"/>  
            <stop offset="100%" stop-color="#eceded"/> 
        </linearGradient>

        <!-- Grey to red gradient -->
        <linearGradient id="greyRedGradient" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#6e757d"/>  
            <stop offset="50%"  stop-color="#a6696e"/>  
            <stop offset="100%" stop-color="#e25b5b"/> 
        </linearGradient>
    </defs>

</svg>
